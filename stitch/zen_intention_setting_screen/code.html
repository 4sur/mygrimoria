<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Zen Intention Setting Screen</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Noto+Serif+JP:wght@300;400;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="../unified.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "ink": "#1a1a1a",
                        "paper": "#fcfcfc",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "serif": ["Noto Serif JP", "serif"],
                    },
                },
            },
        }
    </script>
    <style>
        /* Custom styles for the breathing effect and loading animation */
        .breathing-underline {
            position: relative;
        }

        .breathing-underline::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: currentColor;
            opacity: 0.6;
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scaleX(0.8);
                opacity: 0.3;
            }

            50% {
                transform: scaleX(1);
                opacity: 0.8;
            }
        }

        .loading-particle {
            width: 4px;
            height: 4px;
            background-color: #1a1a1a;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: orbit 2s linear infinite;
        }

        .dark .loading-particle {
            background-color: #fcfcfc;
        }

        @keyframes orbit {
            from {
                transform: rotate(0deg) translateX(20px) rotate(0deg);
            }

            to {
                transform: rotate(360deg) translateX(20px) rotate(-360deg);
            }
        }

        /* Hide scrollbar for cleaner look */
        textarea::-webkit-scrollbar {
            display: none;
        }

        textarea {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body
    class="bg-white dark:bg-ink text-ink dark:text-paper font-sans transition-colors duration-300 min-h-screen flex flex-col">
    <!-- Header: matches App.tsx header -->
    <header class="zen-header">
        <div class="zen-logo">
            <div class="zen-logo-icon">
                <span class="material-symbols-outlined" style="font-size:1.25rem">all_inclusive</span>
            </div>
            <h1 class="zen-logo-title">ZEN I CHING</h1>
        </div>
        <nav class="hidden md:flex items-center gap-8">
            <a class="zen-nav-link" href="#">Readings</a>
            <a class="zen-nav-link" href="#">Archive</a>
            <a class="zen-nav-link" href="#">About</a>
        </nav>
        <div class="flex items-center gap-4">
            <button class="zen-btn-icon">
                <span class="material-symbols-outlined" style="font-size:1.1rem">person</span>
            </button>
        </div>
    </header>
    <main class="flex-grow flex flex-col items-center justify-center relative w-full max-w-4xl mx-auto px-6 py-20">
        <!-- Sacred Text Field -->
        <div class="w-full mb-20 relative group">
            <label class="sr-only" for="intention">State your intention</label>
            <textarea
                class="w-full bg-transparent border-none text-center text-4xl md:text-5xl lg:text-6xl font-serif text-ink dark:text-white placeholder:text-ink/20 dark:placeholder:text-white/20 focus:ring-0 focus:outline-none resize-none overflow-hidden leading-tight py-4"
                id="intention" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
                placeholder="What do you seek from the void?" rows="1"></textarea>
            <!-- Expanding fine horizontal line -->
            <div
                class="h-[1px] bg-ink/10 dark:bg-white/10 w-1/3 mx-auto transition-all duration-700 ease-out group-focus-within:w-full group-focus-within:bg-ink/50 dark:group-focus-within:bg-white/50">
            </div>
        </div>
        <!-- Oracle Selector -->
        <div class="w-full flex justify-center mb-24">
            <div class="flex gap-16 md:gap-24 items-center">
                <!-- Tarot Option -->
                <label class="cursor-pointer group flex flex-col items-center gap-3">
                    <input checked="" class="sr-only peer" name="oracle_type" type="radio" value="tarot" />
                    <div
                        class="text-ink/20 dark:text-white/20 peer-checked:text-ink dark:peer-checked:text-white transition-colors duration-300 breathing-underline pb-2">
                        <span class="material-symbols-outlined text-[32px] font-light">style</span>
                    </div>
                    <span
                        class="text-xs tracking-[0.2em] uppercase text-ink/40 dark:text-white/40 peer-checked:text-ink dark:peer-checked:text-white font-bold transition-colors">Tarot</span>
                </label>
                <!-- Runes Option -->
                <label class="cursor-pointer group flex flex-col items-center gap-3">
                    <input class="sr-only peer" name="oracle_type" type="radio" value="runes" />
                    <div
                        class="text-ink/20 dark:text-white/20 peer-checked:text-ink dark:peer-checked:text-white transition-colors duration-300 peer-checked:breathing-underline pb-2">
                        <span class="material-symbols-outlined text-[32px] font-light">change_history</span>
                    </div>
                    <span
                        class="text-xs tracking-[0.2em] uppercase text-ink/40 dark:text-white/40 peer-checked:text-ink dark:peer-checked:text-white font-bold transition-colors">Runes</span>
                </label>
                <!-- I Ching Option -->
                <label class="cursor-pointer group flex flex-col items-center gap-3">
                    <input class="sr-only peer" name="oracle_type" type="radio" value="iching" />
                    <div
                        class="text-ink/20 dark:text-white/20 peer-checked:text-ink dark:peer-checked:text-white transition-colors duration-300 peer-checked:breathing-underline pb-2">
                        <span class="material-symbols-outlined text-[32px] font-light">menu</span>
                    </div>
                    <span
                        class="text-xs tracking-[0.2em] uppercase text-ink/40 dark:text-white/40 peer-checked:text-ink dark:peer-checked:text-white font-bold transition-colors">I
                        Ching</span>
                </label>
            </div>
        </div>
        <!-- Launch Button -->
        <div class="fixed bottom-12 left-0 right-0 flex justify-center pointer-events-none">
            <button
                class="pointer-events-auto group relative flex items-center gap-3 bg-ink dark:bg-white text-white dark:text-ink h-16 pl-8 pr-10 rounded-full shadow-2xl hover:scale-105 transition-all duration-300 ease-out">
                <span class="material-symbols-outlined text-white dark:text-ink animate-pulse"
                    style="font-size: 20px;">spark</span>
                <span class="text-sm font-bold tracking-widest uppercase font-sans">Consult the Void</span>
                <!-- Subtle glow effect behind button -->
                <div
                    class="absolute inset-0 rounded-full bg-ink dark:bg-white blur-lg opacity-20 group-hover:opacity-40 transition-opacity duration-300 -z-10">
                </div>
            </button>
        </div>
    </main>
    <!-- Invocation State -->
    <div class="fixed inset-0 bg-white/90 dark:bg-ink/90 z-50 flex items-center justify-center hidden pointer-events-none"
        id="loading-overlay">
        <div class="relative size-24 flex items-center justify-center">
            <!-- Concentric ripples -->
            <div class="absolute inset-0 border border-ink/10 dark:border-white/10 rounded-full opacity-50 scale-50 animate-ping"
                style="animation-duration: 3s;"></div>
            <div class="absolute inset-0 border border-ink/10 dark:border-white/10 rounded-full opacity-30 scale-75 animate-ping"
                style="animation-duration: 3s; animation-delay: 1s;"></div>
            <!-- Orbiting particle -->
            <div class="loading-particle"></div>
        </div>
        <p class="absolute bottom-20 text-xs tracking-[0.3em] uppercase text-ink/40 dark:text-white/40 animate-pulse">
            Invoking</p>
    </div>
    <!-- Footer: matches App.tsx -->
    <footer class="zen-footer">
        <div class="zen-footer-inner">
            <span>Heaven</span><span>Earth</span><span>Water</span><span>Fire</span>
        </div>
    </footer>
</body>

</html>
